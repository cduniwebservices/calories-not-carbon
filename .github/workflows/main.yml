name: Flutter CI/CD

on:
  push:
    branches: [master]

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gen.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Generate Version Number
        id: gen
        run: |
          chmod +x .github/scripts/generate_version.sh
          ./.github/scripts/generate_version.sh

  build-ios:
    name: Build iOS App
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Flutter version
        run: flutter --version

      - name: Flutter pub get
        run: flutter pub get

      - name: Show ios/Flutter before config
        run: ls -la ios/Flutter/ || echo "Directory empty or missing"

      - name: Generate iOS config
        run: flutter build ios --config-only --no-codesign

      - name: Show ios/Flutter after config
        run: ls -la ios/Flutter/ || echo "Still empty!"

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update
